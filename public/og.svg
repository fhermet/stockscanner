<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f8fafc"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#e2e8f0" stroke-width="0.5"/>

  <!-- Brand accent bar top -->
  <rect width="1200" height="4" fill="#4f46e5"/>

  <!-- Logo icon (scaled from favicon) -->
  <g transform="translate(100, 220)">
    <rect width="80" height="80" rx="18" fill="#4f46e5"/>
    <rect x="13" y="40" width="15" height="30" rx="3" fill="white" opacity="0.7"/>
    <rect x="33" y="25" width="15" height="45" rx="3" fill="white" opacity="0.85"/>
    <rect x="53" y="10" width="15" height="60" rx="3" fill="white"/>
  </g>

  <!-- Title -->
  <text x="200" y="255" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#0f172a">
    Stock<tspan fill="#4f46e5">Scanner</tspan>
  </text>

  <!-- Subtitle -->
  <text x="200" y="295" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b">
    Scanner d'actions par stratégie d'investissement
  </text>

  <!-- Feature pills -->
  <g transform="translate(100, 370)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#eef2ff"/>
    <text x="90" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#4f46e5" text-anchor="middle">Warren Buffett</text>

    <!-- Pill 2 -->
    <rect x="195" y="0" width="150" height="40" rx="20" fill="#ecfdf5"/>
    <text x="270" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#059669" text-anchor="middle">Peter Lynch</text>

    <!-- Pill 3 -->
    <rect x="360" y="0" width="120" height="40" rx="20" fill="#f5f3ff"/>
    <text x="420" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#7c3aed" text-anchor="middle">Growth</text>

    <!-- Pill 4 -->
    <rect x="495" y="0" width="150" height="40" rx="20" fill="#fffbeb"/>
    <text x="570" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d97706" text-anchor="middle">Dividende</text>
  </g>

  <!-- Stats line -->
  <text x="100" y="460" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#94a3b8">
    340+ actions · 8 indices · S&amp;P 500 · CAC 40 · DAX 40 · FTSE 100
  </text>

  <!-- Bottom URL -->
  <text x="100" y="560" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#cbd5e1">
    stockscanner-coral.vercel.app
  </text>

  <!-- Bottom accent bar -->
  <rect y="626" width="1200" height="4" fill="#4f46e5"/>
</svg>
